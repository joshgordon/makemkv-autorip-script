license=
cache=-1 # in Megabytes; auto=-1
debug=false # enable debug [true/false]
minlength=250 # Minimum length for tracks to be selected (in seconds)
outputdir="/data/ripping" # Path to location where the ripped files should be stored at
slackwebhook= # Slack incoming webhook URL for rip completion notifications (leave empty to disable)
webport=8080 # Port for the web status dashboard (default: 8080)
autoeject=true # whether the disks should open automatically at start
